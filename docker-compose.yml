#
# WordPress Multi-Version + Multi-PHP Test Environment
# Port scheme: {php_major}{php_minor}{wp_major}{wp_minor}
#   e.g. PHP 8.3 + WP 6.8 → port 8368

name: wp-test-env

services:

  # ── Shared Database ────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: wp-test-db
    restart: unless-stopped
    networks:
      - wp-test-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
    volumes:
      - db-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PHP 8.1 + WP 6.1 ─────────────────────────────────
  wp-81-61:
    build:
      context: .
      args:
        BASE_IMAGE: "wordpress:6.1-php8.1-apache"
    container_name: wp-81-61
    ports:
      - "8161:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wp_81_61
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DEBUG: "1"
    volumes:
      - wp-81-61:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wp-test-net

